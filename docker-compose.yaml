name: ascii_portfolio

services:
  postgres:
    image: postgres:17.6
    container_name: ascii_portfolio
    restart: unless-stopped
    environment:
      POSTGRES_USER: ascii_admin
      POSTGRES_PASSWORD: qazwsxedc
      POSTGRES_DB: ascii_portfolio
    ports:
      - "5432:5432"
    volumes:
      - ascii_portfolio_postgres:/var/lib/postgresql/data
    networks:
      - ascii_portfolio_network
  minio:
    image: quay.io/minio/minio:latest
    container_name: ascii_blob
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ascii_admin
      MINIO_ROOT_PASSWORD: qazwsxedc
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server --console-address ":9001" /data
    volumes:
      - ascii_minio:/data

  laravel_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ascii_portfolio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - ascii_portfolio_network
    depends_on:
      - postgres

volumes:
  ascii_portfolio_postgres:
  ascii_minio:

networks:
  ascii_portfolio_network:
    driver: bridge
